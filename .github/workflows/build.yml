name: mjeku-desktop

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mjeku-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm install
      - run: npm --prefix ../mjeku-ui install
      - run: npm run cargo:fmt
      - run: npm run cargo:clippy
      - run: npm run cargo:test
      - run: npm run tauri:build
